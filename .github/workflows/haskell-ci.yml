name: Haskell CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".vscode/**"
      - "images/**"
      - "**.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - ".vscode/**"
      - "images/**"
      - "**.md"

permissions:
  contents: read

jobs:
  dockerfile:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        cabal: ["3.12.1"]
        # This should be the same as the `tested-with` property in psephology.cabal
        ghc: ["9.6.7", "9.8.4", "9.10.3", "9.12.4", "9.14.1"]

    steps:
      - uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v3
        env:
          cache-name: cache-cabal
        with:
          path: |
            ~/.cabal
            dist-newstyle
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Build container
        run: docker build -t psephology --build-arg GHC_VERSION=${{ matrix.ghc }} .
      - name: Run CI
        run: docker run --rm -t psephology make
